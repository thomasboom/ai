name: Publish to crates.io
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: codeberg-tiny
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
